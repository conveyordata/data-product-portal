version: '3'

tasks:
  install:
    desc: "Install SDK development dependencies"
    cmds:
      - poetry install --all-groups

  generate:client:
    desc: "Regenerate the portal API client from the OpenAPI spec"
    cmds:
      - poetry run openapi-python-client generate
          --path ./../docs/static/openapi.json
          --output-path ./sdk/api_client
          --meta none
          --overwrite
      - poetry run python generation/build_event_handler.py
    generates:
      - sdk/api_client/**
      - sdk/event_handler.py
