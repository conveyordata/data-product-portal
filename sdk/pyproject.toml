[project]
name = "data-product-portal-sdk"
version = "0.6.1"
description = "SDK for Data Product Portal"
authors = [
    {name = "Dataminded"}
]
requires-python = ">=3.13"
dependencies = [
    # HTTP client used by the generated api_client to make requests
    "httpx>=0.23.0,<0.29.0",
    # Used by the generated api_client models for @define dataclasses
    "attrs>=22.2.0",
    # Used by generated api_client models for datetime parsing
    "python-dateutil>=2.8.0",
    "fastapi>=0.137.1",
]

[tool.poetry]
packages = [{include = "sdk", from = "."}]

[tool.poetry.dependencies]
python = "^3.13"

[tool.poetry.group.dev.dependencies]
# Used to regenerate sdk/sdk/api_client/ from the OpenAPI spec
openapi-python-client = ">=0.29.0"
mypy = ">=1.0"
pytest = ">=8.0"
pytest-asyncio = ">=0.24"

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "-p no:warnings --import-mode=importlib --durations=0 --durations-min=1.0"

[tool.mypy]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# sdk/sdk/api_client/ is fully auto-generated by openapi-python-client.
# It uses a T TypeVar variable-reuse pattern that mypy cannot follow but is
# correct at runtime. Suppress errors rather than patching generated files.
module = "sdk.api_client.*"
ignore_errors = true

[tool.ruff]
exclude = [
    "sdk/event_handler.py"
]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
