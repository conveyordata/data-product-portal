name: Alembic Latest Migration Test
on:
  push:
    branches: [ "main" ]
  pull_request:
    paths:
      - 'backend/app/database/alembic/**'
      - 'backend/app/**/model.py'
      - 'docker-compose.yml'
      - '.github/workflows/alembic-workflow.yml'

permissions:
  contents: read

jobs:
  incremental_migration_test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Pull Docker Images
        run: docker compose pull

      - name: Start DB and Backend
        run: docker compose up -d postgresql portal

      - name: Wait for Services (PostgreSQL and Backend)
        run: |
          for service in postgresql portal; do
            echo "Waiting for $service to be healthy..."
            for i in {1..30}; do
              ID=$(docker compose ps -q $service)
              if [ "$ID" != "" ]; then
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' $ID)
                echo "$service status: $STATUS"
                if [ "$STATUS" = "healthy" ]; then
                  break
                fi
              fi
              if [ $i -eq 30 ]; then
                echo "$service failed to become healthy in time"
                docker compose logs $service
                exit 1
              fi
              sleep 2
            done
          done

      - name: Downgrade to Previous Migration
        run: docker compose exec portal alembic downgrade -1

      - name: Upgrade to Head Migration
        run: docker compose exec portal alembic upgrade head

      - name: Verify Frontend API is Responding
        run: |
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5050)
          echo "Frontend HTTP status code: $STATUS_CODE"
          test "$STATUS_CODE" -eq 200
