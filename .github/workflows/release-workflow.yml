name: Release workflow

on:
  push:
    tags:
      - '*'

permissions:
  id-token: write
  contents: write

jobs:
  create-gh-release-notes:
    name: Create GitHub release notes and release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Create release notes in github
        id: create_release_notes
        run: |
          echo "Release notes for version ${{ github.ref_name }}"
          RELEASEVERSION="[${{ github.ref_name }}]"
          echo "Version: $RELEASEVERSION"
          RELEASEBODY=$(awk -v ver="$RELEASEVERSION" '/^## / { if (p) { exit }; if ($2 == ver) { p=1; next } } p && NF' docs/docs/release-notes.md)
          {
          echo 'RELEASEBODY<<EOF'
          echo "${RELEASEBODY}"
          echo EOF
          } >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          echo "Creating release for version $tag"
          echo "${{ steps.create_release_notes.outputs.RELEASEBODY }}"
          gh release create "$tag" --title "$tag" --notes "${{ steps.create_release_notes.outputs.RELEASEBODY }}"
          echo "Release created successfully"
