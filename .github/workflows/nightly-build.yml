name: Nightly Docker Compose Test
on:
  schedule:
    - cron: '0 2 * * *'
permissions:
  contents: read

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Start Docker Compose
        run: |
            docker compose up -d
            docker compose ps
      - name: Wait for portal to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5050 || echo "000")
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 5
          done
          echo "Portal did not become healthy in time"
          docker compose logs
          exit 1

  demo-basic:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo/basic
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Start demo
        run: docker compose up -d --build
      - name: Wait for portal to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5050 || echo "000")
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 5
          done
          echo "Portal did not become healthy in time"
          docker compose logs
          exit 1
      - name: Wait for provisioner to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:6060 || echo "000")
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 5
          done
          echo "Provisioner did not become healthy in time"
          docker compose logs
          exit 1
      - name: Tear down
        if: always()
        run: docker compose down -v
