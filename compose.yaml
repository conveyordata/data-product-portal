services:
  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

  postgresql:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: data-product-portal-postgresql
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    env_file:
      - .env.docker
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 2s
      timeout: 1s
      retries: 120

  jaeger:
    image: jaegertracing/jaeger:2.15.1
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  portal:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    ports:
      - "5050:5050"
    volumes:
      # Mount the runtime config.js so OIDC / API URL settings can be injected
      - ${PWD:-.}/frontend/config.docker.js:/frontend_dist/config.js
    depends_on:
      mailhog:
        condition: service_started
      postgresql:
        condition: service_healthy
    command: >
      bash -c "python -m app.db_tool init --force sample_data.sql
      && uvicorn app.main:app --host 0.0.0.0 --port 5050"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050"]
      interval: 5s
      timeout: 3s
      retries: 10
