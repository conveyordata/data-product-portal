<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="800px" height="800px">
  <defs>
    <marker id="arr" markerWidth="3" markerHeight="3" refX="1.5" refY="1.5" orient="auto">
      <polygon points="0,0 3,1.5 0,3" fill="#3DAA47"/>
    </marker>
  </defs>
  <!-- Blue hexagon (flat-top) -->
  <polygon points="7.34,11 24.66,11 27,16 24.66,21 7.34,21 5,16"
           fill="none" stroke="#2D6EAD" stroke-width="2" stroke-linejoin="round"/>
  <!-- Blue dots at hexagon vertices -->
  <circle cx="7.34" cy="11" r="1.8" fill="#2D6EAD"/>
  <circle cx="24.66" cy="11" r="1.8" fill="#2D6EAD"/>
  <circle cx="27" cy="16" r="1.8" fill="#2D6EAD"/>
  <circle cx="24.66" cy="21" r="1.8" fill="#2D6EAD"/>
  <circle cx="7.34" cy="21" r="1.8" fill="#2D6EAD"/>
  <circle cx="5" cy="16" r="1.8" fill="#2D6EAD"/>
  <!-- Green center hub -->
  <circle cx="16" cy="16" r="2.2" fill="#3DAA47"/>
  <!-- 8 green spokes drawn from outer tip toward hub; arrowhead at hub end points inward -->
  <line x1="16" y1="8.5" x2="16" y2="13.0" stroke="#3DAA47" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="21.3" y1="10.7" x2="18.4" y2="13.6" stroke="#3DAA47" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="23.5" y1="16" x2="19.0" y2="16" stroke="#3DAA47" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="21.3" y1="21.3" x2="18.4" y2="18.4" stroke="#3DAA47" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="16" y1="23.5" x2="16" y2="19.0" stroke="#3DAA47" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="10.7" y1="21.3" x2="13.6" y2="18.4" stroke="#3DAA47" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="8.5" y1="16" x2="13.0" y2="16" stroke="#3DAA47" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="10.7" y1="10.7" x2="13.6" y2="13.6" stroke="#3DAA47" stroke-width="1.2" marker-end="url(#arr)"/>
</svg>
