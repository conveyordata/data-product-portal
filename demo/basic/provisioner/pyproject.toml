[project]
name = "provisioner"
version = "0.1.0"
description = ""
authors = [
    {name = "Pascal Knapen",email = "pascal.knapen@dataminded.com"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi (>=0.137.1,<0.138.0)",
    "uvicorn (>=0.38.0,<0.39.0)",
    "cookiecutter (>=2.6.0,<3.0.0)",
    "data-product-portal-sdk"
]

[tool.mypy]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# demo/basic/provisioner imports from data-product-portal-sdk's auto-generated api_client.
# It uses a T TypeVar variable-reuse pattern that mypy cannot follow but is
# correct at runtime. Suppress errors rather than patching generated files.
module = "sdk.api_client.*"
ignore_errors = true

[tool.poetry]
packages = [{include = "provisioner", from = "."}]

[tool.poetry.dependencies]
python = "^3.13"
data-product-portal-sdk = {path = "../../../sdk", develop = false}

[tool.poetry.group.dev.dependencies]
mypy = ">=1.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
