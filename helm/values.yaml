# Default values for data product portal.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

custom_translation_file_path: ""
global:
  postgresql:
    auth:
      password: pw
      database: data-product-portal
      port: "!!string 5432"
      server: data-product-portal-postgresql
      username: postgres
smtp:
  host: localhost
  port: "!!string 1025"
  username: user
  password: not-set
  no_login: false
from_mail_address: ""
email_button_color: ""
webhook:
  url: ""
  secret: ""
cloudwatch_enabled: false
api_key:
  enabled: false
  key: ""
host: www.pleaseupdateme.com
oidc:
  enabled: false
  client_id: id
  client_secret: secret
  authority: www.pleaseupdateme.com
  redirect_uri: www.pleaseupdateme.com
conveyor:
  api_key: conveyor_key
  secret: conveyor_secret
database:
  password: pw
  dbname: data-product-portal
  port: "!!string 5432"
  server: data-product-portal-postgresql
  username: postgres
infrastructure_lambda_arn: ""
aws_session_duration: "!!string 900"

# Pick from datamindedthemeconfig, bluethemeconfig, greenthemeconfig
theme_configuration: "datamindedthemeconfig"

posthog:
  key: phc_NDxOG0gXQtkPItPFJXLOAQhLmbZw7v0SbIQesSWO4gc
  host: https://eu.i.posthog.com
  enabled: false

replicaCount: 1

image:
  repository: dataminded.docker.scarf.sh/conveyordata/data-product-portal
  pullPolicy: Always
  tag: 0.6.0

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "portal-backend"

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: NodePort
  port: 5050

ingress:
  enabled: true
  className: ""
  annotations: {}
  pathType: Prefix
  hosts:
    - paths:
      - path: /
        pathType: Prefix
        name: data-product-portal
        number: 5050
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

volumes:
  - name: varlog
    emptyDir: {}
  - name: sampledata
    configMap:
      name: sampledata
      optional: true
  - name: tmpdir
    emptyDir: {}
  - name: frontend-config
    configMap:
      name: frontend

volumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: sampledata
    mountPath: /sampledata
  - name: tmpdir
    mountPath: /tmp
  - name: frontend-config
    mountPath: /frontend_dist/config.js
    subPath: config.js

nodeSelector: {}

tolerations: []

affinity: {}

namespace_max_length: "!!string 64"

enabled_plugins:
- ConveyorPlugin
- GlueTechnicalAssetConfiguration
- S3TechnicalAssetConfiguration
